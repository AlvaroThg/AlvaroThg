name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Generate GitHub stats cards
        uses: stats-organization/github-readme-stats-action@v1
        with:
          username: AlvaroThg
          output_dir: assets
          theme: transparent
          cards: "stats,top-langs"
          top_languages_layout: compact

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update github stats"
